name: hyperlocal_gig
description: "HyperLocal Gig Map - A map-based micro-job marketplace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Maps (OpenStreetMap - free, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  
  # UI Components
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  google_fonts: ^6.2.1
  
  # UUID
  uuid: ^4.5.1
  
  # URL Launcher (for opening Google Maps, etc.)
  url_launcher: ^6.3.2
  
  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.8
  firebase_storage: ^12.4.4
  
  # Camera / Image
  image_picker: ^1.1.2
  
  # Intl for formatting
  intl: ^0.19.0
  
  # Icons
  flutter_vector_icons: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
